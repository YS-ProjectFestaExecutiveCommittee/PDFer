<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票用紙 1500枚 一括生成ツール</title>
<!-- PDF生成ライブラリ (jsPDF) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- QRコード生成ライブラリ (QRious) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<style>
  :root {
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --bg: #f8fafc;
    --surface: #ffffff;
  }
  body {
    font-family: 'Segoe UI', 'Meiryo', 'Hiragino Kaku Gothic ProN', sans-serif;
    background-color: var(--bg);
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  .container {
    background: var(--surface);
    padding: 2.5rem 2rem;
    border-radius: 12px;
    box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    width: 90%;
    max-width: 550px;
    text-align: center;
  }
  h1 {
    font-size: 1.5rem;
    color: #0f172a;
    margin-bottom: 1.5rem;
  }
  .warning {
    background-color: #fef2f2;
    color: #991b1b;
    padding: 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
    text-align: left;
    line-height: 1.5;
  }
  .controls {
    display: flex;
    gap: 15px;
    justify-content: center;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  input[type="number"] {
    padding: 0.5rem;
    width: 100px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    font-size: 1.1rem;
    text-align: center;
  }
  button {
    background-color: var(--primary);
    color: white;
    border: none;
    padding: 0.85rem 1.5rem;
    font-size: 1.05rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-bottom: 10px;
    box-shadow: 0 4px 6px -1px rgb(37 99 235 / 0.2);
  }
  button:hover:not(:disabled) { 
    background-color: var(--primary-hover);
    transform: translateY(-1px);
  }
  button:disabled { 
    background-color: #cbd5e1; 
    color: #64748b;
    cursor: not-allowed; 
    box-shadow: none;
  }
  
  .btn-all { background-color: #059669; box-shadow: 0 4px 6px -1px rgb(5 150 105 / 0.2); }
  .btn-all:hover:not(:disabled) { background-color: #047857; }
  .btn-custom { background-color: #475569; box-shadow: 0 4px 6px -1px rgb(71 85 105 / 0.2); }
  .btn-custom:hover:not(:disabled) { background-color: #334155; }

  .url-settings {
    background-color: #f1f5f9;
    padding: 1rem;
    border-radius: 8px;
    margin-bottom: 1.5rem;
    text-align: left;
  }
  .url-settings h3 {
    font-size: 1rem;
    margin-top: 0;
    margin-bottom: 1rem;
    color: #334155;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .setting-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
  }
  .setting-controls select {
    padding: 0.4rem;
    border-radius: 4px;
    border: 1px solid #cbd5e1;
    font-size: 0.95rem;
  }
  .dept-group {
    background: #ffffff;
    padding: 12px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    margin-bottom: 10px;
  }
  .dept-group:last-child {
    margin-bottom: 0;
  }
  .dept-header {
    font-size: 0.85rem;
    font-weight: bold;
    color: var(--primary);
    margin-bottom: 8px;
  }
  .input-row {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    gap: 10px;
  }
  .input-row:last-child {
    margin-bottom: 0;
  }
  .input-row label {
    flex: 0 0 45px;
    font-size: 0.85rem;
    font-weight: bold;
    color: #475569;
    margin: 0;
  }
  .input-row input[type="text"] {
    flex: 1;
    padding: 0.4rem 0.5rem;
    border: 1px solid #cbd5e1;
    border-radius: 4px;
    font-size: 0.85rem;
  }

  #status {
    margin-top: 1rem;
    font-weight: bold;
    color: var(--primary);
    min-height: 1.5em;
    font-size: 0.95rem;
  }
  .progress-bar-container {
    width: 100%;
    background-color: #e2e8f0;
    border-radius: 6px;
    margin-top: 15px;
    overflow: hidden;
    display: none;
  }
  .progress-bar {
    height: 10px;
    background-color: var(--primary);
    width: 0%;
    transition: width 0.2s ease-out;
  }
</style>
</head>
<body>

<div class="container">
  <h1>🎟️ 投票用紙PDF 一括生成ツール</h1>
  
  <div class="warning">
    <b>【注意事項】</b><br>
    ・ブラウザのメモリ上限を回避するため、1500枚のPDFは<b>300枚ずつ、5つのファイルに分割</b>してダウンロードされます。<br>
    ・初回生成時は日本語フォントの読み込みに数秒かかります。<br>
    ・生成中はブラウザを閉じたり更新したりしないでください。
  </div>

  <div class="url-settings">
    <h3>🔗 賞の項目設定 <span style="font-size:0.8rem; font-weight:normal; color:#64748b;">(URL末尾にブースIDが自動で付きます)</span></h3>
    
    <div class="setting-controls">
      <label style="font-size: 0.9rem; font-weight: bold; color: #334155;">1ページに出力する数:</label>
      <select id="qr-count" onchange="updateDeptVisibility()">
        <option value="4" selected>4個</option>
        <option value="5">5個</option>
        <option value="6">6個</option>
      </select>
    </div>

    <div id="dept-list">
      <!-- 項目の入力欄（最大6個まで用意） -->
      <div class="dept-group" id="dept-group-1">
        <div class="dept-header">賞 1</div>
        <div class="input-row"><label>名前:</label><input type="text" id="name-1" value="🏆 優秀賞 (GP)"></div>
        <div class="input-row"><label>URL:</label><input type="text" id="url-1" value="https://ys-projectfestaexecutivecommittee.github.io/QRV2026-GP/?booth="></div>
      </div>
      <div class="dept-group" id="dept-group-2">
        <div class="dept-header">賞 2</div>
        <div class="input-row"><label>名前:</label><input type="text" id="name-2" value="💡 ユニーク賞 (UQ)"></div>
        <div class="input-row"><label>URL:</label><input type="text" id="url-2" value="https://ys-projectfestaexecutivecommittee.github.io/QRV2026-UQ/?booth="></div>
      </div>
      <div class="dept-group" id="dept-group-3">
        <div class="dept-header">賞 3</div>
        <div class="input-row"><label>名前:</label><input type="text" id="name-3" value="🎤 プレゼン力賞 (PS)"></div>
        <div class="input-row"><label>URL:</label><input type="text" id="url-3" value="https://ys-projectfestaexecutivecommittee.github.io/QRV2026-PS/?booth="></div>
      </div>
      <div class="dept-group" id="dept-group-4">
        <div class="dept-header">賞 4</div>
        <div class="input-row"><label>名前:</label><input type="text" id="name-4" value="🎨 デザイン賞 (DS)"></div>
        <div class="input-row"><label>URL:</label><input type="text" id="url-4" value="https://ys-projectfestaexecutivecommittee.github.io/QRV2026-DS/?booth="></div>
      </div>
      <div class="dept-group" id="dept-group-5" style="display: none;">
        <div class="dept-header">賞 5</div>
        <div class="input-row"><label>名前:</label><input type="text" id="name-5" value="🌟 特別賞 (SP)"></div>
        <div class="input-row"><label>URL:</label><input type="text" id="url-5" value="https://ys-projectfestaexecutivecommittee.github.io/QRV2026-SP/?booth="></div>
      </div>
      <div class="dept-group" id="dept-group-6" style="display: none;">
        <div class="dept-header">賞 6</div>
        <div class="input-row"><label>名前:</label><input type="text" id="name-6" value="🤝 参加賞 (PA)"></div>
        <div class="input-row"><label>URL:</label><input type="text" id="url-6" value="https://ys-projectfestaexecutivecommittee.github.io/QRV2026-PA/?booth="></div>
      </div>
    </div>
  </div>

  <button id="btn-auto-all" class="btn-all" onclick="generateAll1500()">
    🚀 1〜1500番まで全自動生成（推奨）
  </button>

  <hr style="margin: 25px 0; border: 0; border-top: 1px dashed #cbd5e1;">
  
  <p style="font-size: 0.9rem; color: #475569; margin-bottom: 10px; font-weight: bold;">または 手動で範囲を指定して生成（最大500枚まで）</p>
  <div class="controls">
    <input type="number" id="startId" value="1" min="1" max="1500">
    <span style="color: #64748b; font-weight: bold;">〜</span>
    <input type="number" id="endId" value="10" min="1" max="1500">
  </div>
  <button id="btn-custom" class="btn-custom" onclick="generateCustomRange()">指定範囲のPDFを生成</button>

  <div class="progress-bar-container" id="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div id="status"></div>
</div>

<script>
// 選択した数に応じて入力欄の表示/非表示を切り替える
function updateDeptVisibility() {
  const count = parseInt(document.getElementById('qr-count').value);
  for (let i = 1; i <= 6; i++) {
    const group = document.getElementById(`dept-group-${i}`);
    if (i <= count) {
      group.style.display = 'block';
    } else {
      group.style.display = 'none';
    }
  }
}

// 画面入力から有効な部門のデータを取得する
function getDepartments() {
  const count = parseInt(document.getElementById('qr-count').value);
  const depts = [];
  for (let i = 1; i <= count; i++) {
    depts.push({
      name: document.getElementById(`name-${i}`).value,
      urlBase: document.getElementById(`url-${i}`).value
    });
  }
  return depts;
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

function updateStatus(text, progress = null) {
  document.getElementById('status').innerText = text;
  if (progress !== null) {
    document.getElementById('progress-container').style.display = 'block';
    document.getElementById('progress-bar').style.width = `${progress}%`;
  } else {
    document.getElementById('progress-container').style.display = 'none';
  }
}

function lockButtons(locked) {
  document.getElementById('btn-auto-all').disabled = locked;
  document.getElementById('btn-custom').disabled = locked;
  document.getElementById('startId').disabled = locked;
  document.getElementById('endId').disabled = locked;
  document.getElementById('qr-count').disabled = locked;
  for (let i = 1; i <= 6; i++) {
    document.getElementById(`name-${i}`).disabled = locked;
    document.getElementById(`url-${i}`).disabled = locked;
  }
}

// 日本語フォントを一度だけダウンロードしてキャッシュする
let cachedFontBase64 = null;
async function getJapaneseFont() {
  if (cachedFontBase64) return cachedFontBase64;
  updateStatus("PDF用日本語フォントをダウンロード中... (初回のみ)", 5);
  try {
    // Google FontsからSawarabi Gothic（軽量な日本語フォント）を取得
    const url = 'https://raw.githubusercontent.com/google/fonts/main/ofl/sawarabigothic/SawarabiGothic-Regular.ttf';
    const response = await fetch(url);
    if (!response.ok) throw new Error("フォントの取得に失敗しました");
    const buffer = await response.arrayBuffer();
    
    // ArrayBufferをBase64に変換（コールスタック超過を防ぐためチャンクで処理）
    let binary = '';
    const bytes = new Uint8Array(buffer);
    const chunkSize = 8192;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    }
    cachedFontBase64 = window.btoa(binary);
    return cachedFontBase64;
  } catch (err) {
    console.error(err);
    throw new Error("日本語フォントの読み込みに失敗しました。インターネット接続を確認してください。");
  }
}

// -----------------------------------------------------
// PDF生成のメインロジック
// -----------------------------------------------------
async function generatePDF(start, end, fileSuffix = "") {
  // フォントの取得
  const fontBase64 = await getJapaneseFont();

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
  
  // 日本語フォントをjsPDFに登録して適用
  doc.addFileToVFS("SawarabiGothic-Regular.ttf", fontBase64);
  doc.addFont("SawarabiGothic-Regular.ttf", "Sawarabi", "normal");
  doc.setFont("Sawarabi", "normal");
  
  const totalPages = end - start + 1;
  let pageCount = 0;

  for (let i = start; i <= end; i++) {
    // 2ページ目以降はページを追加
    if (pageCount > 0) doc.addPage();
    pageCount++;

    // --- タイトル周り ---
    doc.setFontSize(30);
    doc.text(`投 票 用 紙`, 105, 30, { align: "center" });
    
    doc.setFontSize(18);
    doc.setTextColor(80, 80, 80);
    // ブースID（4桁ゼロ埋め）
    doc.text(`ブースID : ${String(i).padStart(4, '0')}`, 105, 42, { align: "center" });
    
    doc.setFontSize(11);
    doc.setTextColor(0, 0, 0);
    doc.text("各賞のQRコードをスマートフォンで読み取って投票してください。", 105, 52, { align: "center" });

    // --- 部門のQRコードを配置 ---
    const departments = getDepartments();
    const rowsCount = Math.ceil(departments.length / 2); // 4個なら2行、5〜6個なら3行
    
    // 行数に合わせてレイアウトパラメータを調整
    const qrSize = rowsCount === 2 ? 70 : 55;   // QRコードのサイズ
    const startY = rowsCount === 2 ? 70 : 60;   // 1行目の開始Y座標
    const rowPitch = rowsCount === 2 ? 105 : 78; // 次の行までの距離
    const nameFontSize = rowsCount === 2 ? 18 : 16; // 賞の名前のフォントサイズ

    departments.forEach((dept, index) => {
      const col = index % 2; // 0 (左) or 1 (右)
      const row = Math.floor(index / 2); // 0行目, 1行目, 2行目
      
      // X座標の基準位置（左列の中心は52.5mm、右列の中心は157.5mm）
      const centerX = col === 0 ? 52.5 : 157.5;
      const x = centerX - (qrSize / 2);
      const y = startY + (row * rowPitch);

      const url = dept.urlBase + i;
      
      // QRコードを生成
      const qr = new QRious({ value: url, size: 250, level: 'M' });
      const qrDataUrl = qr.toDataURL('image/jpeg');
      
      // 部門名（中央揃え）
      doc.setFontSize(nameFontSize);
      doc.text(dept.name, centerX, y - 5, { align: "center" });
      
      // QRコード画像
      doc.addImage(qrDataUrl, 'JPEG', x, y, qrSize, qrSize);
      
      // QRの下に小さく補足文字（中央揃え）
      doc.setFontSize(10);
      doc.setTextColor(100, 100, 100);
      doc.text(`読み取って投票 (ID: ${i})`, centerX, y + qrSize + 6, { align: "center" });
      doc.setTextColor(0, 0, 0);
    });

    // 進捗の更新
    const pct = Math.floor((pageCount / totalPages) * 100);
    updateStatus(`[ID: ${start} 〜 ${end}] 生成中... ${pageCount} / ${totalPages} 枚目`, pct);

    // UIのフリーズを防ぐため、10枚ごとに一瞬処理を休止
    if (pageCount % 10 === 0) {
      await sleep(10);
    }
  }

  // PDFの保存
  const filename = `投票用紙_${String(start).padStart(4, '0')}_to_${String(end).padStart(4, '0')}${fileSuffix}.pdf`;
  updateStatus(`PDFを保存しています... (${filename})`, 100);
  doc.save(filename);
}

// -----------------------------------------------------
// 1500枚を自動で5分割して生成
// -----------------------------------------------------
async function generateAll1500() {
  lockButtons(true);
  
  // 300枚ずつ5バッチに分ける
  const batches = [
    { s: 1, e: 300, name: "_1" },
    { s: 301, e: 600, name: "_2" },
    { s: 601, e: 900, name: "_3" },
    { s: 901, e: 1200, name: "_4" },
    { s: 1201, e: 1500, name: "_5" }
  ];

  try {
    for (let i = 0; i < batches.length; i++) {
      const b = batches[i];
      updateStatus(`バッチ ${i+1}/5 の処理を開始します...`);
      await sleep(1000); // UI更新とメモリ開放のための待機
      
      await generatePDF(b.s, b.e, b.name);
      
      if (i < batches.length - 1) {
        updateStatus(`バッチ ${i+1} が完了しました。次のダウンロードを準備中... \n※ブラウザの「複数ファイルのダウンロード許可」が出た場合は許可してください。`, 100);
        await sleep(3500); // 次の処理前に意図的に少し長めに待つ（クラッシュ防止）
      }
    }
    updateStatus('🎉 全ての投票用紙（1500枚）の生成が完了しました！', 100);
  } catch (error) {
    updateStatus(`エラーが発生しました: ${error.message}`);
    alert("エラーが発生しました。\n" + error.message);
  } finally {
    lockButtons(false);
  }
}

// -----------------------------------------------------
// 範囲指定での生成
// -----------------------------------------------------
async function generateCustomRange() {
  const start = parseInt(document.getElementById('startId').value);
  const end = parseInt(document.getElementById('endId').value);

  if (isNaN(start) || isNaN(end) || start > end || start < 1 || end > 1500) {
    alert("正しい数値を入力してください。(1〜1500の範囲)");
    return;
  }
  
  if (end - start > 500) {
    alert("メモリ不足によるクラッシュを防ぐため、手動設定で一度に生成できるのは最大500枚までです。\n1500枚すべて生成する場合は上の「全自動生成」ボタンをご利用ください。");
    return;
  }

  lockButtons(true);
  try {
    await generatePDF(start, end);
    updateStatus(`🎉 指定範囲（${start} 〜 ${end}）のPDF生成が完了しました！`, 100);
  } catch (error) {
    updateStatus(`エラーが発生しました: ${error.message}`);
    alert("エラーが発生しました。\n" + error.message);
  } finally {
    lockButtons(false);
  }
}
</script>

</body>
</html>
